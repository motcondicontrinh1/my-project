name = "door-control-worker"
main = "worker.js"
compatibility_date = "2024-11-01"

[placement]
mode = "smart"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
# Non-secret config. Secrets are set via: wrangler secret put <NAME>
# Required secrets: MQTT_URL, MQTT_USERNAME, MQTT_PASSWORD, UI_PIN
# Optional secrets: GROQ_API_KEY (enables LLM fallback on POST /voice)
TOPIC_PREFIX = "h/b7e3f1a29c4d8e05"
ALLOWED_ORIGIN = "https://my-project-lrkb.vercel.app"

# KV namespace for persisting PIN-failure counts and 24h IP bans
[[kv_namespaces]]
binding = "BANS"
id = "c0132456d3264505820811be553a048f"
